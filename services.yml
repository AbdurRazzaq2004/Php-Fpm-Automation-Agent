# =============================================================================
# PHP-FPM Automation Agent — Deployment Config for test PHP app
# =============================================================================

service_name: my-php-app
domain: 3.80.23.205
repo_url: https://github.com/greg-md/php-app.git
branch: master
deploy_path: /var/www/my-php-app
document_root_suffix: /public

php_version: "8.2"
web_server: nginx

php_extensions:
  - cli
  - fpm
  - common
  - curl
  - mbstring
  - xml
  - zip
  - mysql
  - opcache

enable_ssl: false

max_upload_size: "64M"
php_memory_limit: "256M"
php_max_execution_time: 300

php_pool_max_children: 10
php_pool_start_servers: 2
php_pool_min_spare: 1
php_pool_max_spare: 4

post_deploy_commands:
  - "composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev"
