# ============================================================
# PHP-FPM Automation Agent - Laravel Application Example
# ============================================================
# Deploy a Laravel application with smart auto-detection.
#
# The agent automatically handles Laravel apps:
#   - Detects PHP version from composer.json
#   - Sets document root to /public
#   - Installs required PHP extensions (including DB driver)
#   - Detects database driver from .env / config/database.php
#   - Installs & configures the database engine safely
#   - Runs artisan commands (key:generate, migrate, cache, etc.)
#   - Sets storage & cache directories writable
#   - Installs Composer (latest from getcomposer.org)
#
# MINIMAL CONFIG — auto-detect handles the rest:
#   service_name: laravel-app
#   domain: laravel.example.com
#   repo_url: https://github.com/your-org/laravel-project.git
#   branch: main
#   deploy_path: /var/www/laravel-app
#
# Usage:
#   sudo python3 deployer.py deploy --config examples/laravel-app.yml
# ============================================================

# ── Required Fields ─────────────────────────────────────────
service_name: laravel-app
domain: laravel.example.com
repo_url: https://github.com/your-org/laravel-project.git
branch: main                    # Specify the correct branch (main, master, develop, etc.)
deploy_path: /var/www/laravel-app

# ── Auto-Detection (detects PHP ver, framework, DB, extensions) ──
auto_detect: true

# ── Optional Overrides ─────────────────────────────────────
# Uncomment these only if you want to override auto-detection:
# php_version: "8.2"
# document_root_suffix: "public"         # Auto-detected for Laravel
# php_extensions: [cli, fpm, ...]        # Auto-detected from composer.json

web_server: nginx

# Private repo access
# pat_token: ghp_xxxxxxxxxxxxxxxxxxxx

# Environment file (create this on the server first)
# environment_file: /etc/php-deployer/envs/laravel-app.env

# SSL
enable_ssl: false

# Upload limits
max_upload_size: "128M"

# PHP-FPM pool tuning for Laravel
php_memory_limit: "512M"
php_max_execution_time: 300
php_pool_max_children: 20
php_pool_start_servers: 4
php_pool_min_spare: 2
php_pool_max_spare: 8
php_pool_max_requests: 500

# Writable dirs (auto-detected for Laravel, but you can customize)
# writable_dirs:
#   - "storage"
#   - "bootstrap/cache"

# Directories that persist across deployments
shared_dirs:
  - "storage/app/public"
  - "storage/logs"

# Post-deploy commands (leave empty for auto-detected Laravel commands)
# The agent auto-generates these for Laravel:
#   - cp .env.example .env (if .env doesn't exist)
#   - composer install
#   - php artisan key:generate
#   - touch database/database.sqlite (if using SQLite)
#   - php artisan migrate --force
#   - php artisan config:cache
#   - php artisan route:cache
#   - php artisan view:cache
#   - php artisan storage:link
#
# Override with your own commands:
# post_deploy_commands:
#   - "composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev"
#   - "php artisan migrate --force"

# Laravel scheduler cron
cron_jobs:
  - "* * * * * cd /var/www/laravel-app && php artisan schedule:run >> /dev/null 2>&1"
