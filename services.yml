# =============================================================================
# PHP-FPM Automation Agent — Deployment Config for Laravel app
# =============================================================================

service_name: my-php-app
domain: 98.81.165.46
repo_url: https://github.com/laravel/laravel.git
branch: master
deploy_path: /var/www/my-php-app
document_root_suffix: /public

php_version: "8.2"
web_server: nginx

php_extensions:
  - cli
  - fpm
  - common
  - curl
  - mbstring
  - xml
  - zip
  - mysql
  - opcache
  - redis
  - bcmath
  - tokenizer
  - fileinfo

enable_ssl: false

max_upload_size: "64M"
php_memory_limit: "256M"
php_max_execution_time: 300

php_pool_max_children: 10
php_pool_start_servers: 2
php_pool_min_spare: 1
php_pool_max_spare: 4

post_deploy_commands:
  - "cp .env.example .env"
  - "composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev"
  - "php artisan key:generate --force"
  - "php artisan config:cache"
  - "php artisan route:cache"
  - "php artisan view:cache"
