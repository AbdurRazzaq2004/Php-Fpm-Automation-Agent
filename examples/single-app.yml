# ============================================================
# PHP-FPM Automation Agent - Single Application Example
# ============================================================
# Deploy a single PHP application with smart auto-detection.
#
# The agent automatically detects:
#   - PHP version from composer.json
#   - Framework type (Laravel, Symfony, WordPress, etc.)
#   - Database driver (MySQL, PostgreSQL, SQLite)
#   - Required PHP extensions
#   - Document root and post-deploy commands
#
# Usage:
#   sudo python3 deployer.py deploy --config examples/single-app.yml
# ============================================================

# ── Required Fields ─────────────────────────────────────────
service_name: my-php-app
domain: app.example.com
repo_url: https://github.com/your-org/your-app.git
branch: main                    # IMPORTANT: specify the correct branch!
deploy_path: /var/www/my-php-app

# ── Auto-Detection ──────────────────────────────────────────
auto_detect: true               # Detects PHP version, framework, DB, extensions

# ── Optional Overrides (uncomment to override auto-detection) ─
# php_version: "8.2"            # Override auto-detected PHP version
# document_root_suffix: /public # Override auto-detected document root
# php_extensions:               # Override auto-detected extensions
#   - cli
#   - fpm
#   - common
#   - curl
#   - mbstring
#   - xml
#   - zip
#   - mysql
#   - opcache
#   - gd
#   - intl
#   - bcmath

web_server: nginx

# Private repo? Add your PAT token
# pat_token: ghp_xxxxxxxxxxxxxxxxxxxx

# SSL (set to true after DNS is configured)
enable_ssl: false

# Upload limits
max_upload_size: "64M"

# PHP-FPM pool tuning
php_memory_limit: "256M"
php_max_execution_time: 300
php_pool_max_children: 10
php_pool_start_servers: 2
php_pool_min_spare: 1
php_pool_max_spare: 4

# Post-deploy commands (leave empty for auto-detected framework commands)
# post_deploy_commands:
#   - "composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev"
